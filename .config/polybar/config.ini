[colors]
background = #323d43
background-alt = #d1c4e99
foreground = #b59979
foreground-alt = #282e3a
primary = #ffb52a
secondary = #e60053
alert = #B48EAD

color-0 = #211023
color-1 = #311126
color-2 = #46152a
color-3 = #661f2f
color-4 = #892e33
color-5 = #a83e33
color-6 = #e06d34
color-7 = #f18233
color-8 = #ff9e33
color-9 = #ffffd9
color-10 = #ffd5a3

cyan = #87c095
aqua = #8FBCBB
red = #e68183
yellow = #d9bb80
green = #a7c080
orange = #E39B75
magenta = #d3a0bc
white = #d8caac
pink = #C394B4
blue = #89beba
black = #3c474d

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[bar/example]
width = 100%
height = 28
radius = 0.0
fixed-center = true

background = ${colors.background}
foreground = ${colors.foreground}

padding-left = 0
padding-right = 0

border-size = 8
border-color = ${colors.background} 

module-margin-left = 0
module-margin-right = 0

font-0 = "Iosevka Semibold:size=16.3;4"
font-1 = "SauceCodePro Nerd Font Mono:size=20;5"
font-2 = "Noto Sand Nerd Font:pixelsize=12;3"
;font-3 = "Sinji:pixelsize=15;5"
;font-4 = "Togalite medium:pixelsize=11;2"

; MODULES SETUP
modules-left = logo left1 bspwm left2 
modules-center = medium1 windowtitle medium2
; modules-right = notification-center right1 pacman-updates filesystem cpu memory volume date right2 shutdown
modules-right = right1 filesystem cpu memory volume date right2 shutdown

;tray-position = center
;tray-padding = 2
;tray-background = #0063ff

cursor-click = pointer
cursor-scroll = pointer

wm-restack = bspwm

line-size = 2

;separator = %{F#4C566A}|%{F-}

[module/left1]
type = custom/text
content-foreground = ${colors.black}
content = " Óā∂"

[module/left2]
type = custom/text
content-foreground = ${colors.black}
content = "Óāī"

[module/medium1]
type = custom/text
content-foreground = ${colors.black}
content = " Óā∂"

[module/medium2]
type = custom/text
content-foreground = ${colors.black}
content = "Óāī"

[module/right1]
type = custom/text
content-foreground = ${colors.black}
content = " Óā∂"

[module/right2]
type = custom/text
content-foreground = ${colors.black}
content = "Óāī"



;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/bspwm]
type = internal/bspwm

label-focused = "%name%"
label-focused-background = ${colors.black}
;label-focused-underline= ${colors.cyan}
label-focused-foreground = ${colors.color-8}
label-focused-padding = 1

label-occupied = %name%
label-occupied-background = ${colors.black}
label-occupied-foreground = ${colors.foreground}
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.black}
label-urgent-foreground = ${colors.color-8}
label-urgent-padding = 1

label-empty = %name% 
label-empty-background = ${colors.black}
label-empty-foreground = #8c775e
label-empty-padding = 1


; Separator in between workspaces
label-separator = 
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/logo]
type = custom/text
content = ÔīĎ
content-padding = 1
content-foreground = ${colors.color-8}

[module/notification-center]
type = custom/script
exec = echo Ô°•
interval = 100
label = "  %output%  "

;format-background = ${colors.white}
format-foreground = ${colors.white}

click-left = $HOME/.scripts/rofi_notif_center.sh

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
;
[module/kernel-name]
type = custom/script
exec = uname -r
interval = 10000
label = "  Ô†ľ  %output% "
format-foreground = ${colors.white}
label-font = 3
label-padding = 1

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/filesystem]
type = internal/fs


; Mountpoints to display
mount-0 = /

; Seconds to sleep between updates
; Default: 30
interval = 10

; Display fixed precision values
; Default: false
fixed-values = true

; Spacing between entries
; Default: 2
spacing = 4

; Available tags:
;   <label-mounted> (default)
;   <bar-free>
;   <bar-used>
;   <ramp-capacity>
format-mounted = <label-mounted>

; Available tags:
;   <label-unmounted> (default)
format-unmounted = <label-unmounted>

; Available tokens:
;   %mountpoint%
;   %type%
;   %fsname%
;   %percentage_free%
;   %percentage_used%
;   %total%
;   %free%
;   %used%
; Default: %mountpoint% %percentage_free%%
label-mounted = " Óóĺ %percentage_used%%"

; Available tokens:
;   %mountpoint%
; Default: %mountpoint% is not mounted
label-unmounted = %mountpoint%: not mounted
label-unmounted-foreground = #55
label-unmounted-background = ${colors.black}
label-mounted-background = ${colors.black}

label-mounted-foreground = ${colors.blue}
label-mounted-font = 3

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/windowtitle]
type = internal/xwindow
format = <label>
format-background = ${colors.black}
format-foreground = ${colors.blue}
format-padding = 1
format-font = 3
label = "Ôčź  %title%"
label-maxlen = 50
label-empty = " ÔĄą "
label-separator = " "
label-empty-foreground = ${colors.blue}
label-font = 3
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/volume]
type = internal/pulseaudio
format-volume =  "<ramp-volume><label-volume>"
ramp-volume-0 ="   Ô©Ņ "
ramp-volume-0-font = 3
ramp-volume-1 ="   Ô©Ņ "
ramp-volume-1-font = 3
ramp-volume-2 ="   Ô©Ĺ "
ramp-volume-2-font = 3
format-volume-background = ${colors.black}
format-volume-foreground = ${colors.cyan}
format-volume-padding = 0
format-volume-font = 3
label-volume-font = 3
ramp-volume-font = 3

format-muted = <label-muted>
format-muted-background = ${colors.black} 	
format-muted-foreground = ${colors.red}
label-muted ="   Ô™Ä 0%"
format-muted-font = 3
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 100

format-charging = <label-charging>
format-charging-prefix = "ÓÜ£ "
format-charging-prefix-font = 2
label-charging = "%percentage%%  " 

format-discharging = <label-discharging>
label-discharging = "%percentage%% "
format-discharging-prefix = "ÓÜ§ "
format-discharging-prefix-font = 2

format-discharging-background = ${colors.aqua}
format-discharging-foreground = ${colors.background}

format-charging-background = ${colors.orange}
format-charging-foreground = ${colors.background}

label-full = ÓÜ§
format-full-background = ${colors.green}
format-full-foreground = ${colors.background}
format-full-prefix-font = 1
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/network]
type = internal/network
interface = wlo1
format-connected = <label-connected>
format-connected-prefix = " ÓÜļ"
format-connected-prefix-font = 2
label-connected = " %essid%%downspeed:9% "
label-connected-font = 1

format-disconnected = <label-disconnected>
label-disconnected = Óáö
label-disconnected-font = 2

format-connected-background = ${colors.color-8}
format-connected-foreground = ${colors.background}
format-disconnected-background = ${colors.white}
format-disconnected-foreground = ${colors.background}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/spotify]
type = custom/script
interval = 1
format-prefix ="    ÔÜľ  "
format = <label>
format-background = ${colors.black}
format-foreground = ${colors.cyan}
format-padding = 0

exec = python3 $HOME/.config/polybar/modules/spotify/spotify_status.py -t 50 -qf '{artist}: {song}'
click-left = bspc desktop -f '^8' --follow
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/memory]
type = internal/memory
; Seconds to sleep between updates
interval = 3

label = "   ÓČ¶ %percentage_used%%"
label-font = 3

format-prefix-padding = 2
format-prefix-font = 2
format-prefix-foreground = #ffffff
format-background = ${colors.black}
format-foreground = ${colors.orange}
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

[module/wired-network]
type = internal/network
interface = enp2s0
interval = 3.0

udspeed-minwidth = 5

accumulate-stats = true
unknown-as-up = true

format-connected = <label-connected>
format-disconnected = <label-disconnected>

label-connected = "  ÔõŅ%downspeed%  "
label-connected-foreground = ${colors.background}
label-connected-background = ${colors.green}

label-disconnected = "ÔúĀ  "
label-disconnected-foreground = ${colors.background}
label-disconnected-background = ${colors.white}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/cpu]
type = internal/cpu

interval = 1
format = <label>
label = "   Ô°ö %percentage%%"
label-font = 3

format-background = ${colors.black}
format-foreground = ${colors.yellow}

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/date]
type = internal/date
interval = 1

date = 
date-alt = "  Ô®ü  %A, %b %d -"

time = "  ÓéÖ %H:%M "
time-alt = "%I:%M:%S %p "

;format-prefix = "ÓéÖ"
format-prefix-padding = 1
format-prefix-font = 3
format-prefix-foreground = #ffffff
format-background = ${colors.black}
format-foreground = ${colors.white}

label = %date% %time%
label-font = 3
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[module/shutdown]
type = custom/text
content = " Ô§§"
;content-background = ${colors.black}
content-foreground = ${colors.red}
content-padding = 1
click-left = rofi -show power-menu -modi power-menu:rofi-power-menu
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
[settings]
screenchange-reload = true
;compositing-background = xor
;compositing-background = screen
;compositing-foreground = source
;compositing-border = over
;pseudo-transparency = false

[global/wm]
;margin-top = 5
;margin-bottom = 5

